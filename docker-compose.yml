version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ledgerdesk-postgres
    environment:
      POSTGRES_USER: ledgerdesk
      POSTGRES_PASSWORD: ledgerdesk_dev
      POSTGRES_DB: ledgerdesk
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerdesk"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledgerdesk-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ledgerdesk-api
    environment:
      DATABASE_URL: postgresql+asyncpg://ledgerdesk:ledgerdesk_dev@postgres:5432/ledgerdesk
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./sample_data:/app/sample_data

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ledgerdesk-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ledgerdesk:ledgerdesk_dev@postgres:5432/ledgerdesk
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./sample_data:/app/sample_data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ledgerdesk-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
